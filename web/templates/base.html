<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack — {% block title %}Dashboard{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-mark">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M10 2L18 7V13L10 18L2 13V7L10 2Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        <path d="M10 6L14 8.5V13L10 15.5L6 13V8.5L10 6Z" fill="currentColor" opacity="0.4"/>
                    </svg>
                </div>
                <span class="logo-text">FinTrack</span>
            </div>

            <nav class="nav">
                <div class="nav-group">
                    <span class="nav-label">Overview</span>
                    <a href="{{ url_for('main.index') }}" class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                        Dashboard
                    </a>
                    <a href="{{ url_for('main.summary') }}" class="nav-link {% if request.endpoint == 'main.summary' %}active{% endif %}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                        Analytics
                    </a>
                </div>
                <div class="nav-group">
                    <span class="nav-label">Finance</span>
                    <a href="{{ url_for('main.budget') }}" class="nav-link {% if request.endpoint == 'main.budget' %}active{% endif %}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                        Budget
                    </a>
                    <a href="{{ url_for('main.investments') }}" class="nav-link {% if request.endpoint == 'main.investments' %}active{% endif %}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                        Investments
                    </a>
                    <a href="{{ url_for('main.categories') }}" class="nav-link {% if request.endpoint == 'main.categories' %}active{% endif %}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
                        Categories
                    </a>
                </div>
                <div class="nav-group">
                    <span class="nav-label">Intelligence</span>
                    <a href="{{ url_for('main.ai') }}" class="nav-link {% if request.endpoint == 'main.ai' %}active{% endif %}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                        AI Assistant
                        <span class="nav-badge">AI</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="user-avatar">B</div>
                    <div class="user-info">
                        <span class="user-name">Bilge</span>
                        <span class="user-plan">Personal</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <h1 class="page-title">{% block page_heading %}Dashboard{% endblock %}</h1>
                </div>
                <div class="topbar-right">
                    <div class="topbar-date" id="current-date"></div>
                </div>
            </header>

            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        const d = new Date();
        document.getElementById('current-date').textContent = d.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    </script>
</body>
</html>
